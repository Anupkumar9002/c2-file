# Database configuration for tests (uses in-memory H2)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false

# JPA / Hibernate for tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Security Configuration for tests
app.jwt.secret=9a62a938c414a9b4d8d17b5e679a8e9b4c3e21827495b5832a84a6c4b2c12481
app.jwt.expiration=86400000

# File Upload Limit Configuration for tests
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Platform Business Configuration for tests
app.otp.expiry.minutes=10
app.platform.fee.percentage=2.5
