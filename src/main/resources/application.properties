# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/carbondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Security Configuration (256-bit hex key)
app.jwt.secret=9a62a938c414a9b4d8d17b5e679a8e9b4c3e21827495b5832a84a6c4b2c12481
app.jwt.expiration=86400000

# File Upload Limit Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Platform Business Configuration
app.otp.expiry.minutes=10
app.platform.fee.percentage=2.5
